worker_processes 1;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # HTML: nunca cachear. El navegador siempre ve la última versión con
        # los query strings actualizados para los assets.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # JS/CSS: revalidar siempre contra ETag. Como llevan ?v=N, cuando
        # sube la versión el browser los re-descarga igual.
        location ~* \.(js|css)$ {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Proxy al backend FastAPI — el `set` + `resolver` fuerza a nginx a
        # resolver `backend` en cada request, no solo al arranque. Asi sobrevive
        # a rebuilds del contenedor backend sin devolver 502.
        # El `rewrite` saca el prefijo `/api/` porque con variables en
        # proxy_pass nginx NO hace el stripping automatico del trailing slash.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream "http://backend:8000";
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 180s;
        }

        location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
